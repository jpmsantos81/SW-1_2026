<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cálculo de Salário</title>
</head>
<body>
    <h1>Cálculo de Salário Líquido</h1>
    <form action="script.php" method="post">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required><br><br>
        
        <label for="salario">Salário Bruto (R$):</label>
        <input type="number" id="salario" name="salario" step="0.01" required><br><br>
        
        <label for="faltas">Número de Faltas:</label>
        <input type="number" id="faltas" name="faltas" min="0" required><br><br>
        
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
