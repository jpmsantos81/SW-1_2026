<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mexendo no js</title>
</head>

<body>

    <div class="Exercicio">
        <h1>Exercicio 1</h1>
        <h2 id="textNome">Visitante</h2>
        <div>
            <label for="name">Digite seu nome:</label>
            <input type="text" id="inputNome">
            <br>
            <button type="button" onclick="trocarNome()" id="btnNome">Trocar nome</button>
        </div>
    </div>

    <div class="Exercicio">
        <h1>Exercicio 2</h1>
        <h2 id="resultadoText">Resultado: 0</h2>

        <input type="number" class="inputNumber" id="num1" placeholder="Numero">
        <br>
        <p>++++++++</p>
        <input type="number" class="inputNumber" id="num2" placeholder="Numero">
        <br><br>

        <button id="btnSomar" onclick="Somar()">Somar</button>
    </div>

    <div class="Exercicio">
        <h1>Exercicio 3</h1>
        <h2 id="IMCText">IMC: </h2>
        <input id="pesoInput" type="number" class="inputNumber" placeholder="Peso (kg)" >
        <br>
        <input id="alturaInput" type="number" class="inputNumber" placeholder="Altura (m)">
        <br><br>
        <button onclick="CalcularIMC()">Calcular</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
